<!DOCTYPE html>
<html lang="en">
<head>

  <title>Knitting Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #f5f0e8;
      --warm:   #ede6d6;
      --sand:   #c9b99a;
      --ink:    #2c2318;
      --muted:  #7a6a58;
      --accent: #7a3e2a;
      --card-r: 12px;
      --gap:    1.5rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      line-height: 1.65;
      min-height: 100vh;
    }

    header {
      padding: 4rem 2rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--sand);
      background: var(--warm);
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }
    header .tagline {
      font-style: italic;
      color: var(--muted);
      font-size: 1.05rem;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 4rem;
    }

    .project-header {
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--sand);
    }
    .project-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .project-header .desc {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 65ch;
    }

    .scroll-track {
      display: flex;
      gap: var(--gap);
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 0.75rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
    }
    .scroll-track:active { cursor: grabbing; }
    .scroll-track::-webkit-scrollbar { height: 5px; }
    .scroll-track::-webkit-scrollbar-track { background: var(--warm); border-radius: 99px; }
    .scroll-track::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 99px; }

    .img-card {
      flex: 0 0 auto;
      width: 280px;
      height: 340px;
      border-radius: var(--card-r);
      overflow: hidden;
      scroll-snap-align: start;
      background: var(--warm);
      border: 1px solid var(--sand);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .img-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(44,35,24,0.12);
    }
    .img-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--sand);
      border-top: 1px solid var(--warm);
    }

    @media (max-width: 600px) {
      main { padding: 2rem 1rem 4rem; gap: 3rem; }
      .img-card { width: 220px; height: 270px; }
    }
  </style>
</head>

<script>
  document.querySelectorAll('.scroll-track').forEach(track => {
    let isDown = false, startX, scrollLeft;
    track.addEventListener('mousedown', e => {
      isDown = true;
      startX = e.pageX - track.offsetLeft;
      scrollLeft = track.scrollLeft;
    });
    document.addEventListener('mouseup', () => { isDown = false; });
    track.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - track.offsetLeft;
      track.scrollLeft = scrollLeft - (x - startX);
    });
  });
</script>
